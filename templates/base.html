<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MeteoSpan{% endblock %}</title>

    <!-- Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Enable dark mode via a class on the <html> element -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <!-- Chart.js for the temperature graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Load dark mode preference before the page renders (prevents flicker) -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors">

    <!-- Header -->
    <header class="bg-white dark:bg-slate-800 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🌤️</span>
                <h1 class="text-xl font-bold">MeteoSpan</h1>
            </div>
            <button
                id="theme-toggle"
                class="px-3 py-2 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors"
                aria-label="Toggle dark mode"
            >
                <span class="dark:hidden">🌙</span>
                <span class="hidden dark:inline">☀️</span>
            </button>
        </div>
    </header>

    <!-- Main content block -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="max-w-5xl mx-auto px-4 py-6 text-center text-sm text-slate-500 dark:text-slate-400">
        <p>Built with Flask & Open-Meteo API &middot; <a href="https://github.com/keremcdm/MeteoSpan" class="underline hover:text-slate-700 dark:hover:text-slate-200">GitHub</a></p>
    </footer>

    <!-- Dark mode toggle script -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>

</body>
</html>
